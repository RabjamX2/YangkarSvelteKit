# .github/workflows/deploy.yml

name: Deploy Yangkar Website

on:
    push:
        branches:
            - main

jobs:
    deploy-backend:
        name: Deploy Backend API
        runs-on: ubuntu-24.04
        environment: production

        steps:
            - name: Deploy to Backend Server
              uses: appleboy/ssh-action@v1.0.3
              with:
                  host: ${{ secrets.BACKEND_SSH_HOST }}
                  username: ${{ secrets.BACKEND_SSH_USERNAME }}
                  password: ${{ secrets.BACKEND_SSH_PASSWORD }}
                  script_stop: true
                  command_timeout: 10m
                  script: |
                      set -e
                      export NVM_DIR="$HOME/.nvm"
                      [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"

                      cd /home/yangkarbhoeche-api/htdocs/api.yangkarbhoeche.com/YangkarSvelteKit

                      # Reset working tree to latest main, discarding any local changes
                      git fetch origin main
                      git checkout main
                      git reset --hard origin/main

                      # Install dependencies (frozen to match committed lockfile)
                      pnpm install --frozen-lockfile

                      # Run database migrations
                      pnpm --filter backend exec prisma migrate deploy

                      # Generate Prisma client (no engine needed in production)
                      pnpm --filter backend exec prisma generate --no-engine

                      # Restart backend, or start if not running
                      cd apps/backend
                      pm2 restart backend --update-env || pm2 start src/index.js --name backend

    deploy-frontend:
        name: Deploy Frontend App
        runs-on: ubuntu-24.04
        environment: production
        needs: deploy-backend

        steps:
            - name: Deploy and build on the server
              uses: appleboy/ssh-action@v1.0.3
              with:
                  host: ${{ secrets.FRONTEND_SSH_HOST }}
                  username: ${{ secrets.FRONTEND_SSH_USERNAME }}
                  password: ${{ secrets.FRONTEND_SSH_PASSWORD }}
                  script_stop: true
                  command_timeout: 15m
                  script: |
                      set -e
                      export NVM_DIR="$HOME/.nvm"
                      [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"

                      cd /home/yangkarbhoeche/htdocs/yangkarbhoeche.com/YangkarSvelteKit

                      # Reset working tree to latest main, discarding any local changes
                      git fetch origin main
                      git checkout main
                      git reset --hard origin/main

                      # Install all dependencies (frozen to match committed lockfile)
                      pnpm install --frozen-lockfile

                      # Build the frontend app
                      NODE_ENV=production pnpm --filter frontend build

                      # Restart the service, or start if not running
                      cd apps/frontend
                      export PORT=5000
                      export PUBLIC_BACKEND_URL=https://api.yangkarbhoeche.com
                      pm2 restart frontend --update-env || pm2 start build/index.js --name frontend
